name: DMG Build

on:
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-dmg:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DMG
        run: npm run dist:dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify DMG exists
        run: |
          DMG=$(find release -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG file found in release/"
            exit 1
          fi
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"
          echo "DMG_NAME=$(basename "$DMG")" >> "$GITHUB_ENV"
          echo "Found: $DMG ($(du -h "$DMG" | cut -f1))"

      - name: Upload DMG as artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_PATH }}

      - name: Attach DMG to release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.DMG_PATH }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
